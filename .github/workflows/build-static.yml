name: Build Static Container

on:
  push:
    branches: [ "develop" ]
    paths:
      - 'nginx/**'
      - '.github/workflows/**'

jobs:
  build-rihlar-static:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          platforms: linux/amd64
          push: true
          context: ./nginx
          file: ./nginx/dockerfile
          tags: ghcr.io/${{ github.repository }}/rihlar-static:${{ github.sha }}, ghcr.io/${{ github.repository }}/rihlar-static:latest