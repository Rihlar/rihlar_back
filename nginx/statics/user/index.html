<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>プロファイル管理画面</title>
    <link rel="stylesheet" href="./styles/style.css">
</head>
<body>
    <div class="container">
        <h1>プロファイル管理画面</h1>

        <div class="create-form-container">
            <button id="toggle-create-form-btn">新規プロファイル作成</button>
            <section id="create-profile-section" class="create-profile-section collapsible-content hidden">
                <h2>新規プロファイル作成</h2>
                <form id="create-profile-form">
                    <div class="form-group">
                        <label for="name">ユーザー名 (必須):</label>
                        <input type="text" id="name" name="name" required>
                    </div>
                    <div class="form-group">
                        <label for="comment">コメント:</label>
                        <input type="text" id="comment" name="comment">
                    </div>
                    <div class="form-group">
                        <label for="region_id">地域ID (選択):</label>
                        <select id="region_id" name="region_id" class="region-select" required>
                            <option value="" disabled selected>地域を読み込み中...</option>
                        </select>
                    </div>
                    <button type="submit" id="create-btn">プロファイルを作成</button>
                    <p id="create-status-message"></p>
                </form>
            </section>
        </div>

        <hr class="separator">

        <h2 style="margin-top: 30px;">登録済みプロファイル一覧</h2>
        <div class="table-wrapper">
            <table id="profiles-table">
                <thead>
                    <tr>
                        <th class="header-sortable" data-key="name">名前</th>
                        <th class="header-sortable" data-key="user_id">ユーザーID</th>
                        <th class="header-sortable" data-key="region_id">地域</th>
                        <th class="header-sortable" data-key="coin">コイン</th>
                        <th class="header-sortable" data-key="latitude">緯度</th>
                        <th class="header-sortable" data-key="longitude">経度</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="profiles-table-body">
                    <tr><td colspan="7" class="loading-message">データを読み込み中...</td></tr>
                </tbody>
            </table>
        </div>
        <p id="error-message" class="error-message" style="display: none;"></p>
    </div>

    <div id="edit-profile-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <span class="close-button">&times;</span>
            <h2>プロファイル編集</h2>
            <form id="edit-profile-form">
                <input type="hidden" id="edit-user-id" name="user_id">
                <div class="form-group">
                    <label for="edit-name">ユーザー名 (必須):</label>
                    <input type="text" id="edit-name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="edit-comment">コメント:</label>
                    <input type="text" id="edit-comment" name="comment">
                </div>
                <div class="form-group">
                    <label for="edit-region_id">地域ID (選択):</label>
                    <select id="edit-region_id" name="region_id" class="region-select" required>
                        <option value="" disabled selected>地域を読み込み中...</option>
                    </select>
                </div>
                <button type="submit" id="update-btn">プロファイルを更新</button>
                <p id="update-status-message"></p>
            </form>
        </div>
    </div>

    <script src="../authbase/authbase.js"></script>
    <script src="./scripts/utils.js"></script>
    <script src="./scripts/api.js"></script>
    <script src="./scripts/ui.js"></script>
    <script src="./scripts/home.js"></script>
</body>
</html>
