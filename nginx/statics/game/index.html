<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ゲーム管理画面</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-gray-100 min-h-screen flex flex-col items-center py-8 px-4 sm:px-6 lg:px-8">
    <div class="max-w-4xl w-full bg-white p-8 rounded-xl shadow-lg">
        <h1 class="text-4xl font-extrabold text-gray-900 mb-8 text-center">ゲーム管理ダッシュボード</h1>

        <div class="mb-8 text-right">
            <button id="addGameBtn"
                class="bg-gray-800 hover:bg-gray-900 text-white font-bold py-3 px-6 rounded-lg shadow-md transition duration-300 ease-in-out transform hover:scale-105">
                新しいゲームを作成
            </button>
        </div>

        <div id="gameList" class="space-y-6">
            <p class="text-center text-gray-500">ゲームがありません。新しいゲームを作成してください。</p>
        </div>
    </div>

    <div id="gameModal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4 modal-overlay">
        <div class="bg-white rounded-xl shadow-2xl p-8 w-full max-w-md transform transition-all scale-95 opacity-0 duration-300 ease-out"
            id="gameModalContent">
            <h2 id="modalTitle" class="text-3xl font-bold text-gray-900 mb-6 text-center">新しいゲームを作成</h2>
            <form id="gameForm" class="space-y-5">
                <div>
                    <label for="gameName" class="block text-sm font-medium text-gray-700 mb-1">ゲーム名</label>
                    <input type="text" id="gameName" name="gameName" required
                        class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-gray-500 focus:border-gray-500 sm:text-base">
                </div>
                <div>
                    <label for="gameRegion" class="block text-sm font-medium text-gray-700 mb-1">リージョン</label>
                    <select id="gameRegion" name="gameRegion" required
                        class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-gray-500 focus:border-gray-500 sm:text-base">
                        </select>
                </div>
                <div>
                    <label for="gameTime" class="block text-sm font-medium text-gray-700 mb-1">開催時間</label>
                    <input type="datetime-local" id="gameTime" name="gameTime" required
                        class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-gray-500 focus:border-gray-500 sm:text-base">
                </div>
                <div>
                    <label for="gameDuration" class="block text-sm font-medium text-gray-700 mb-1">開催期間（日数）</label>
                    <input type="number" id="gameDuration" name="gameDuration" min="1" value="1" required
                        class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-gray-500 focus:border-gray-500 sm:text-base">
                </div>
                <div>
                    <label for="gameTypeSelect" class="block text-sm font-medium text-gray-700 mb-1">ゲームタイプ</label>
                    <select id="gameTypeSelect" name="gameType" required
                        class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-gray-500 focus:border-gray-500 sm:text-base">
                        <option value="personal">個人のゲーム</option>
                        <option value="team">チームのゲーム</option>
                    </select>
                </div>
                <div class="flex justify-end space-x-4 pt-4">
                    <button type="button" id="cancelGameModalBtn"
                        class="bg-gray-300 hover:bg-gray-400 text-gray-800 font-semibold py-2 px-5 rounded-lg transition duration-200 ease-in-out">キャンセル</button>
                    <button type="submit"
                        class="bg-gray-700 hover:bg-gray-800 text-white font-bold py-2 px-5 rounded-lg shadow-md transition duration-300 ease-in-out transform hover:scale-105">作成</button>
                </div>
            </form>
        </div>
    </div>

    <div id="gameDetailsModal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4 modal-overlay">
        <div class="bg-white rounded-xl shadow-2xl p-8 w-full max-w-lg transform transition-all scale-95 opacity-0 duration-300 ease-out"
            id="gameDetailsModalContent">
            <h2 id="detailsModalGameName" class="text-3xl font-bold text-gray-900 mb-4 text-center">ゲーム詳細</h2>
            <p class="text-gray-700 mb-2"><strong>リージョン:</strong> <span id="detailsModalRegion"></span></p>
            <p class="text-gray-700 mb-2"><strong>開催時間:</strong> <span id="detailsModalTime"></span></p>
            <p class="text-gray-700 mb-4"><strong>開催期間:</strong> <span id="detailsModalDuration"></span> 日間</p>
            <p class="text-gray-700 mb-4"><strong>ゲームタイプ:</strong> <span id="detailsModalGameType"></span></p>

            <h3 class="text-2xl font-bold text-gray-900 mb-4 mt-6 text-center">チーム一覧</h3>
            <div id="teamList" class="max-h-60 overflow-y-auto border border-gray-200 rounded-md p-4 space-y-2 mb-4">
                <p class="text-center text-gray-500" id="noTeamsMessage">チームがありません。</p>
            </div>

            <div class="flex justify-end mt-6">
                <button type="button" id="closeDetailsModalBtn"
                    class="bg-gray-300 hover:bg-gray-400 text-gray-800 font-semibold py-2 px-5 rounded-lg transition duration-200 ease-in-out">閉じる</button>
            </div>
        </div>
    </div>

    <div id="membersModal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4 modal-overlay">
        <div class="bg-white rounded-xl shadow-2xl p-8 w-full max-w-md transform transition-all scale-95 opacity-0 duration-300 ease-out"
            id="membersModalContent">
            <h2 class="text-3xl font-bold text-gray-900 mb-6 text-center">メンバー一覧</h2>
            <div id="memberList" class="max-h-60 overflow-y-auto border border-gray-200 rounded-md p-4 space-y-2">
                </div>
            <div class="flex justify-end mt-6">
                <button type="button" id="closeMembersModalBtn"
                    class="bg-gray-300 hover:bg-gray-400 text-gray-800 font-semibold py-2 px-5 rounded-lg transition duration-200 ease-in-out">閉じる</button>
            </div>
        </div>
    </div>

    <div id="confirmModal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4 modal-overlay">
        <div class="bg-white rounded-xl shadow-2xl p-8 w-full max-w-sm transform transition-all scale-95 opacity-0 duration-300 ease-out"
            id="confirmModalContent">
            <h2 class="text-2xl font-bold text-gray-900 mb-4 text-center">確認</h2>
            <p id="confirmMessage" class="text-gray-700 text-center mb-6">本当に削除しますか？</p>
            <div class="flex justify-center space-x-4">
                <button type="button" id="cancelConfirmBtn"
                    class="bg-gray-300 hover:bg-gray-400 text-gray-800 font-semibold py-2 px-5 rounded-lg transition duration-200 ease-in-out">キャンセル</button>
                <button type="button" id="confirmActionBtn"
                    class="bg-red-500 hover:bg-red-600 text-white font-bold py-2 px-5 rounded-lg shadow-md transition duration-300 ease-in-out transform hover:scale-105">確認</button>
            </div>
        </div>
    </div>

    <script src="../authbase/authbase.js"></script>
    <script src="script.js"></script>
</body>

</html>
