<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>チーム・メンバー管理</title>
    <link rel="stylesheet" href="./styles/style.css">
</head>
<body>
    <div class="container">
        <h1>チーム・メンバー管理</h1>
        <p><a href="../game-admin/">ゲーム管理画面に戻る</a></p>
        <h2 id="game-id-heading"></h2>

        <div class="table-wrapper">
            <table id="teams-table">
                <thead>
                    <tr>
                        <th>チームID</th>
                        <th>合計ポイント</th>
                        <th>メンバー</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="teams-table-body">
                    <tr><td colspan="4" class="loading-message">データを読み込み中...</td></tr>
                </tbody>
            </table>
        </div>

        <p id="error-message" class="error-message" style="display: none;"></p>
    </div>

    <script src="../authbase/authbase.js"></script>
    <script src="./scripts/main.js"></script>
</body>
</html>
